<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="es" lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>CV — {{fullName}}</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 10pt;
            color: #1a1a1a;
            background-color: #ffffff;
            padding: 40px 50px;
            line-height: 1.5;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22pt;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .header .job-title {
            font-size: 11pt;
            color: #555555;
            margin-bottom: 8px;
        }

        .header .contact {
            font-size: 9pt;
            color: #333333;
        }

        .header .contact span {
            margin: 0 8px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 11pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 4px;
            margin-bottom: 12px;
        }

        .entry p {
            font-size: 9.5pt;
            text-align: justify;
        }

        .entry ul {
            margin-left: 18px;
            font-size: 9.5pt;
        }

        .entry ul li {
            margin-bottom: 2px;
        }

        .summary p {
            text-align: justify;
            font-size: 9.5pt;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>{{fullName}}</h1>
    <div class="job-title">{{jobTitle}}</div>
    <div class="contact">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
        <span>{{linkedIn}}</span>
        <span>{{website}}</span>
    </div>
</div>

<div class="section summary">
    <div class="section-title">Perfil profesional</div>
    <p>{{summary}}</p>
</div>

<div class="section">
    <div class="section-title">Experiencia laboral</div>
    {{workExperience}}
</div>

<div class="section">
    <div class="section-title">Educación</div>
    {{education}}
</div>

<div class="section">
    <div class="section-title">Habilidades</div>
    {{skills}}
</div>

<div class="section">
    <div class="section-title">Idiomas</div>
    {{languages}}
</div>

</body>
</html>
